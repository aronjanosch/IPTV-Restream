services:
  iptv_restream:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_STREAM_DELAY: 18
        VITE_STREAM_PROXY_DELAY: 30
        #VITE_SYNCHRONIZATION_TOLERANCE: 0.8
        #VITE_SYNCHRONIZATION_MAX_DEVIATION: 4
        #VITE_SYNCHRONIZATION_ADJUSTMENT: 0.06
        #VITE_SYNCHRONIZATION_MAX_ADJUSTMENT: 0.16
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - streams_data:/streams
      - ./channels:/channels
    environment:
      STORAGE_PATH: /streams/
      ADMIN_ENABLED: "true"
      JWT_SECRET: "change_this_to_a_secure_random_string"
      SESSION_SECRET: "change_this_to_a_secure_random_string"
      STREAM_PASSWORD: "change_this_to_a_stream_password"
      TZ: "Europe/Berlin"
      BACKEND_URL: "https://iptv.yourdomain.com"
      # OIDC / Authentik configuration
      OIDC_ISSUER_URL: "https://authentik.yourdomain.com/application/o/streamhub/"
      OIDC_CLIENT_ID: "your-client-id"
      OIDC_CLIENT_SECRET: "your-client-secret"
      OIDC_REDIRECT_URI: "https://iptv.yourdomain.com/api/auth/callback"
      OIDC_FRONTEND_URL: "https://iptv.yourdomain.com"
      OIDC_ADMIN_GROUPS: "streamhub-admins"

volumes:
  streams_data:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
