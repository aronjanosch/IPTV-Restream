version: "3.9"
services:
  iptv_restream:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_STREAM_DELAY: 18
        VITE_STREAM_PROXY_DELAY: 30
        # Optional synchronization tuning
        #VITE_SYNCHRONIZATION_TOLERANCE: 0.8
        #VITE_SYNCHRONIZATION_MAX_DEVIATION: 4
        #VITE_SYNCHRONIZATION_ADJUSTMENT: 0.06
        #VITE_SYNCHRONIZATION_MAX_ADJUSTMENT: 0.16
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - streams_data:/streams
      - channels:/channels
    environment:
      STORAGE_PATH: /streams/
      ADMIN_ENABLED: "true"
      ADMIN_PASSWORD: "your_secure_password"
      JWT_SECRET: "change_this_to_a_secure_random_string"
      STREAM_PASSWORD: "change_this_to_a_stream_password"
      # Set if behind a reverse proxy and auto-detection fails
      #BACKEND_URL: https://iptv.yourdomain.com

volumes:
  streams_data:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
  channels:
