services:
  iptv_restream:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_STREAM_DELAY: 18
        VITE_STREAM_PROXY_DELAY: 30
        #VITE_SYNCHRONIZATION_TOLERANCE: 0.8
        #VITE_SYNCHRONIZATION_MAX_DEVIATION: 4
        #VITE_SYNCHRONIZATION_ADJUSTMENT: 0.06
        #VITE_SYNCHRONIZATION_MAX_ADJUSTMENT: 0.16
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - streams_data:/streams
      - db_data:/data
      - ./channels:/channels
    environment:
      STORAGE_PATH: ${STORAGE_PATH}
      DB_PATH: ${DB_PATH}
      # Initial admin account — only used to seed the database on first boot
      ADMIN_NAME: ${ADMIN_NAME}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      SESSION_SECRET: ${SESSION_SECRET}
      STREAM_PASSWORD: ${STREAM_PASSWORD}
      TZ: ${TZ}
      BACKEND_URL: ${BACKEND_URL}
      # Optional: OIDC / SSO (e.g. Authentik, Keycloak)
      OIDC_ISSUER_URL: ${OIDC_ISSUER_URL}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET}
      OIDC_REDIRECT_URI: ${OIDC_REDIRECT_URI}
      OIDC_FRONTEND_URL: ${OIDC_FRONTEND_URL}
      OIDC_ADMIN_GROUPS: ${OIDC_ADMIN_GROUPS}

volumes:
  db_data:
  streams_data:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
